/* Vergleichsbalken: Volumen dieser Übung heute vs. letztes Training derselben Einheit.
   Bei Körpergewichtsübungen (Volumen = 0) werden stattdessen die Wiederholungen verglichen. */
function exRepsNow(ex){
  return ex.sets.filter(s=>s.done).reduce((a,s)=>a+(+s.reps||0),0);
}
function exRepsInLog(log, exName, exId){
  if(!log) return 0;
  const e=log.exercises.find(x=> (exId && x.exId===exId) || x.name===exName);
  if(!e) return 0;
  return e.sets.filter(s=>s.done!==false).reduce((a,s)=>a+(+s.reps||0),0);
}
function volCompare(ex){
  const exId=ex.exId;
  const prevLog=lastSessionLog(SESSION.dayName);
  let now=exVolumeNow(ex);
  let prev=exVolumeInLog(prevLog, ex.name, exId);
  // Fallback: Gibt es kein Training DERSELBEN Einheit (z. B. Einheit umbenannt,
  // freies Training oder anderer Plan), nimm das letzte Vorkommen dieser Übung
  // überhaupt – sonst bliebe der "Zuletzt"-Balken fälschlich leer.
  let prevReps2=null;
  if(!prev){
    const lp=lastPerf(ex.name, exId);
    if(lp){
      const f=exFactor(ex.name, exId);
      prev=lp.ex.sets.filter(s=>s.done!==false).reduce((a,s)=>a+(+s.weight||0)*f*(+s.reps||0),0);
      prevReps2=lp.ex.sets.filter(s=>s.done!==false).reduce((a,s)=>a+(+s.reps||0),0);
    }
  }
  let unit='kg', title='Volumen';
  // Kein Gewicht im Spiel (Körpergewicht) -> Wiederholungen vergleichen
  const nowReps=exRepsNow(ex);
  let prevReps=exRepsInLog(prevLog, ex.name, exId);
  if(!prevReps && prevReps2!=null) prevReps=prevReps2;
  if(now===0 && prev===0 && (nowReps>0 || prevReps>0)){
    now=nowReps; prev=prevReps; unit='Wdh'; title='Wiederholungen';
  }
  if(!prev && !now) return ''; // weder Vorgeschichte noch geleistete Sätze
  const max=Math.max(now, prev, 1);
  const nowPct=Math.round(now/max*100);
  const prevPct=Math.round(prev/max*100);
  const fmt=v=>v.toLocaleString('de-DE')+' '+unit;
  let delta='';
  if(prev>0 && now>0){
    const d=Math.round((now/prev-1)*100);
    const cls = d>0?'up' : (d<0?'down':'same');
    delta=`<span class="vc-delta ${cls}">${d>0?'+':''}${d}%</span>`;
  } else if(!prev){
    delta=`<span class="vc-delta same">neu</span>`;
  }
  return `<div class="vc">
    <div class="vc-title">
      <span>${title}</span>${delta}
    </div>
    <div class="vc-row">
      <span class="vc-lbl">Heute</span>
      <div class="vc-track"><div class="vc-fill now" style="width:${nowPct}%"></div></div>
      <span class="vc-val">${fmt(now)}</span>
    </div>
    <div class="vc-row">
      <span class="vc-lbl">Zuletzt</span>
      <div class="vc-track"><div class="vc-fill prev" style="width:${prevPct}%"></div></div>
      <span class="vc-val prev">${prev?fmt(prev):'–'}</span>
    </div>
  </div>`;
}
function fmtPrev(p){
  if(!p) return '–';
  return `${p.weight}×${p.reps}`;
}
function setRow(ex,ei,st,si){
  const ph=st.sug&&st.sug.weight?st.sug.weight:'';
  const f=exFactor(ex.name);
  const prevRow = st.prev ? `<div class="set-grid prev-grid">
      <span></span>
      <span class="prev-cell">${st.prev.weight} kg</span>
      <span class="prev-cell">${st.prev.reps} Wdh</span>
      <span></span>
    </div>` : '';
  // Satz-Volumen: zuletzt (aus dem letzten Training) und heute (live).
  // f = Hantel-Faktor (2 bei zwei Hanteln), damit das Volumen zum Gesamtgewicht passt.
  const prevVol = st.prev ? (+st.prev.weight||0)*f*(+st.prev.reps||0) : 0;
  const nowVol  = (+st.weight||0)*f*(+st.reps||0);
  const volRow = `<div class="set-vol" id="vol-${ei}-${si}">${setVolText(prevVol, nowVol)}</div>`;
  const totalRow = f===2 ? `<div class="set-grid total-grid">
      <span></span>
      <span class="total-cell" id="tot-${ei}-${si}">${(+st.weight||0)>0?`gesamt ${(+st.weight||0)*2} kg`:''}</span>
      <span></span><span></span>
    </div>` : '';
  const wInput = f===2
    ? `<input class="input" inputmode="decimal" placeholder="${ph||'–'}" value="${st.weight}" oninput="updateTotal(${ei},${si},this.value)" onchange="setVal(${ei},${si},'weight',this.value)">`
    : `<input class="input" inputmode="decimal" placeholder="${ph||'–'}" value="${st.weight}" oninput="updateSetVol(${ei},${si})" onchange="setVal(${ei},${si},'weight',this.value)">`;
  const rInput = `<input class="input" inputmode="numeric" placeholder="${ex.targetReps||'–'}" value="${st.reps}" oninput="updateSetVol(${ei},${si})" onchange="setVal(${ei},${si},'reps',this.value)">`;
  return `<div class="set-block" data-set="${ei}-${si}">
    ${prevRow}
    <div class="set-grid">
      <span class="display" style="font-size:15px;color:var(--text-faint);text-align:center">${si+1}</span>
      <div class="in-unit">${wInput}<span class="unit">kg</span></div>
      <div class="in-unit">${rInput}<span class="unit">Wdh</span></div>
      <button class="chip" style="width:44px;height:44px;justify-content:center;padding:0;${st.done?'background:var(--accent);color:#0a0c10;border-color:var(--accent)':''}" onclick="toggleSet(${ei},${si})">${I.check}</button>
    </div>
    ${volRow}
    ${totalRow}
  </div>`;
}
// Text für die Satz-Volumen-Zeile: "zuletzt X · heute Y (+Z%)"
function setVolText(prevVol, nowVol){
  const parts=[];
  if(prevVol>0) parts.push(`<span class="sv-prev">zuletzt ${prevVol.toLocaleString('de-DE')} kg</span>`);
  if(nowVol>0){
    let d='';
    if(prevVol>0){
      const pct=Math.round((nowVol/prevVol-1)*100);
      const cls=pct>0?'up':(pct<0?'down':'same');
      d=` <span class="sv-delta ${cls}">${pct>0?'+':''}${pct}%</span>`;
    }
    parts.push(`<span class="sv-now">heute ${nowVol.toLocaleString('de-DE')} kg${d}</span>`);
  }
  return parts.join('<span class="sv-sep">·</span>');
}
// Live-Aktualisierung der Satz-Volumen-Zeile beim Eintippen
function updateSetVol(ei,si){
  const ex=SESSION.exercises[ei]; if(!ex) return;
  const st=ex.sets[si]; if(!st) return;
  // aktuelle Feldwerte übernehmen (damit die Anzeige sofort stimmt)
  const block=document.querySelector(`.set-block[data-set="${ei}-${si}"]`);
  if(block){
    const inputs=block.querySelectorAll('.set-grid .in-unit .input');
    if(inputs[0]) st.weight=inputs[0].value;
    if(inputs[1]) st.reps=inputs[1].value;
  }
  const f=exFactor(ex.name);
  const prevVol = st.prev ? (+st.prev.weight||0)*f*(+st.prev.reps||0) : 0;
  const nowVol  = (+st.weight||0)*f*(+st.reps||0);
  const el=document.getElementById(`vol-${ei}-${si}`);
  if(el) el.innerHTML=setVolText(prevVol, nowVol);
}
function updateTotal(ei,si,val){
  const el=document.getElementById(`tot-${ei}-${si}`); if(!el) return;
  const w=+val||0; el.textContent = w>0 ? `gesamt ${w*2} kg` : '';
  SESSION.exercises[ei].sets[si].weight=val; // Wert schon während der Eingabe halten
  updateSetVol(ei,si); // Satz-Volumen mitziehen
}
function setVal(ei,si,k,v){ SESSION.exercises[ei].sets[si][k]=v; }
function toggleSet(ei,si){
  const ex=SESSION.exercises[ei];
  const st=ex.sets[si];
  if(!st.done){
    if(!st.weight && st.sug && st.sug.weight) st.weight=st.sug.weight;
    if(!st.reps) st.reps=ex.targetReps||'';
  }
  st.done=!st.done;
  renderView();
  // Pausen-Countdown automatisch starten, wenn Satz bestätigt wurde und eine Pause gesetzt ist
  if(st.done && ex.rest>0) startRest(ex.rest, ex.name);
}

/* ================================================================
   PAUSEN-COUNTDOWN (Rest Timer)
   ================================================================ */
let TIMER=null; // {remaining,total,base,label,handle,ended}
function startRest(seconds, label){
  stopRestTick();
  TIMER={remaining:seconds, total:seconds, base:seconds, label:label||'', ended:false};
  renderRestTimer();
  TIMER.handle=setInterval(tickRest,1000);
}
function tickRest(){
  if(!TIMER) return;
  TIMER.remaining--;
  if(TIMER.remaining<=0){
    TIMER.remaining=0; TIMER.ended=true;
    stopRestTick();
    restAlert(); // Ton + Vibration
    renderRestTimer();
    setTimeout(()=>{ if(TIMER&&TIMER.ended) closeRest(); },4000);
  } else {
    renderRestTimer();
  }
}
function stopRestTick(){ if(TIMER&&TIMER.handle){ clearInterval(TIMER.handle); TIMER.handle=null; } }
function closeRest(){ stopRestTick(); TIMER=null; renderRestTimer(); }
function adjustRest(delta){
  if(!TIMER) return;
  TIMER.remaining=Math.max(1, TIMER.remaining+delta);
  TIMER.total=Math.max(TIMER.total, TIMER.remaining);
  if(TIMER.ended){ TIMER.ended=false; if(!TIMER.handle){ TIMER.handle=setInterval(tickRest,1000); } }
  renderRestTimer();
}
function restartRest(){
  if(!TIMER) return;
  startRest(TIMER.base, TIMER.label); // zurück zur ursprünglich eingestellten Pausendauer
}
function fmtClock(s){ const m=Math.floor(s/60), ss=s%60; return `${m}:${String(ss).padStart(2,'0')}`; }
function renderRestTimer(){
  const el=document.getElementById('restTimer'); if(!el) return;
  // Timer nur während einer laufenden Session zeigen
  if(!TIMER || !SESSION){ el.classList.remove('show'); el.innerHTML=''; document.body.classList.remove('timer-on'); return; }
  document.body.classList.add('timer-on'); // Platz im Trainings-Layout reservieren
  const pct = TIMER.total? Math.max(0, Math.min(100, TIMER.remaining/TIMER.total*100)) : 0;
  const ended=TIMER.ended;
  el.innerHTML=`
    <div class="rt-bar"><div class="rt-fill ${ended?'done':''}" style="width:${ended?100:pct}%"></div></div>
    <div class="rt-body">
      <div class="rt-left">
        <span class="rt-ico ${ended?'done':''}">${I.timer}</span>
        <div>
          <div class="rt-time ${ended?'done':''}">${ended?'Pause vorbei!':fmtClock(TIMER.remaining)}</div>
          <div class="rt-label">${ended?'':'Pause'}${TIMER.label&&!ended?' · '+esc(TIMER.label):''}</div>
        </div>
      </div>
      <div class="rt-controls">
        ${ended?'' :`<button class="rt-btn" onclick="adjustRest(-15)" title="15 Sek. weniger">−15</button>
        <button class="rt-btn" onclick="adjustRest(15)" title="15 Sek. mehr">+15</button>`}
        <button class="rt-btn icon" onclick="restartRest()" title="Neu starten">${I.restart}</button>
        <button class="rt-btn icon" onclick="closeRest()" title="Abbrechen">${I.x}</button>
      </div>
    </div>`;
  el.classList.add('show');
}
// Ton (Web Audio) + Vibration am Pausenende
let _audioCtx=null;
function restAlert(){
  // Vibration
  try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){}
  // Ton: kurze Beep-Sequenz
  try{
    _audioCtx = _audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx;
    if(ctx.state==='suspended') ctx.resume();
    const now=ctx.currentTime;
    [0,0.22,0.44].forEach((t,i)=>{
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.type='sine';
      osc.frequency.setValueAtTime(i===2?1046:880, now+t); // letzter Ton höher
      gain.gain.setValueAtTime(0.0001, now+t);
      gain.gain.exponentialRampToValueAtTime(0.35, now+t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now+t+0.18);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now+t); osc.stop(now+t+0.2);
    });
  }catch(e){}
}
function addSet(ei){
  const ex=SESSION.exercises[ei]; const prev=ex.sets[ex.sets.length-1];
  ex.sets.push({weight:'',reps:'',done:false,sug:prev?prev.sug:null,prev:null}); renderView();
}
function removeSessionEx(ei){ SESSION.exercises.splice(ei,1); renderView(); }
function addExerciseToSession(){
  openExercisePicker(sel=>{
    const exId=sel.id||exIdForName(sel.n);
    const sg=suggest(sel.n,10,sel.m,exId);
    const prevSets=prevPerfSets(sel.n, SESSION.dayName, exId);
    const n = prevSets.length ? prevSets.length : 3; // wie beim letzten Mal, sonst 3
    SESSION.exercises.push({exId,name:sel.n,muscle:sel.m,targetReps:10,targetSets:n,rest:90,
      sets:Array.from({length:n},(_,i)=>({weight:'',reps:'',done:false,sug:sg,prev:prevSets[i]||null}))});
    SESSION.page=SESSION.exercises.length-1; // direkt zur neuen Übung
    closeModal(); renderView();
  });
}
function cancelSession(){
  confirmModal('Training abbrechen?','Nicht gespeicherte Sätze gehen verloren.','Abbrechen',()=>{ SESSION=null; closeRest(); renderView(); });
}
function finishSession(){
  const s=SESSION;
  const exercises=s.exercises.map(ex=>({exId:ex.exId||exIdForName(ex.name),name:ex.name,muscle:ex.muscle,targetReps:ex.targetReps,
    sets:ex.sets.filter(x=>x.done).map(x=>({weight:+x.weight||0,reps:+x.reps||0,done:true}))}))
    .filter(ex=>ex.sets.length);
  if(!exercises.length){ toast('Noch keine Sätze abgehakt'); return; }
  DB.logs.push({id:uid(),date:s.date,planName:s.planName,dayName:s.dayName,exercises});
  save(); SESSION=null; closeRest(); toast('Training gespeichert 💪'); go('history');
}

/* ---- Plan-Übersicht: wie oft wird welcher Muskel je Einheit beansprucht? ---- */
function showPlanOverview(id){
  const p=DB.plans.find(x=>x.id===id); if(!p) return;
  let missing=0;   // Übungen ohne hinterlegte beanspruchte Muskeln
  // Zählung je Einheit: Muskel -> Anzahl Übungen, in denen er vorkommt
  const perDay=p.days.map(d=>{
    const count={};
    d.exercises.forEach(e=>{
      const m=exMeta(e.name);
      const muscles=(m && Array.isArray(m.sm)) ? [...m.sm] : [];
      if(!muscles.length){
        missing++;
        muscles.push((m&&m.g)||e.muscle||'—');   // Rückfall: wenigstens die Region
      }
      [...new Set(muscles)].forEach(x=>{ count[x]=(count[x]||0)+1; });
    });
    return {name:d.name, exCount:d.exercises.length, count};
  });
  // Gesamtzählung über den ganzen Plan
  const total={};
  perDay.forEach(d=>Object.entries(d.count).forEach(([m,n])=>{ total[m]=(total[m]||0)+n; }));
  const totalArr=Object.entries(total).sort((a,b)=>b[1]-a[1]);
  const maxT=Math.max(...totalArr.map(x=>x[1]),1);

  openModal(`<div class="grab"></div>
    <h2>${esc(p.name)}</h2>
    <p class="faint" style="font-size:12px;margin:4px 0 14px">Wie oft wird welcher Muskel beansprucht?</p>
    ${missing?`<div class="ov-note">
      Bei ${missing} ${missing===1?'Übung':'Übungen'} sind noch keine beanspruchten Muskeln hinterlegt.
      Dort wird ersatzweise die Körperregion gezählt. Trage die Muskeln in der Übung nach, um eine genauere Übersicht zu erhalten.
    </div>`:''}

    ${perDay.map(d=>{
      const arr=Object.entries(d.count).sort((a,b)=>b[1]-a[1]);
      const maxD=Math.max(...arr.map(x=>x[1]),1);
      return `<div class="card" style="padding:13px 15px;margin-bottom:10px">
        <div class="row between" style="margin-bottom:10px">
          <span style="font-weight:700;font-size:14px">${esc(d.name)}</span>
          <span class="faint" style="font-size:11px">${d.exCount} Übungen</span>
        </div>
        ${arr.length? arr.map(([m,n])=>`<div class="ov-row">
          <span class="ov-lbl">${esc(m)}</span>
          <div class="ov-track"><div class="ov-fill" style="width:${Math.round(n/maxD*100)}%"></div></div>
          <span class="ov-val">${n}×</span>
        </div>`).join('') : `<div class="faint" style="font-size:12px">Noch keine Übungen.</div>`}
      </div>`;
    }).join('')}

    ${totalArr.length?`<div class="card" style="padding:13px 15px;margin-bottom:10px;border-color:var(--accent-dim)">
      <div class="eyebrow" style="margin-bottom:10px;color:var(--accent-dim)">Gesamter Plan</div>
      ${totalArr.map(([m,n])=>`<div class="ov-row">
        <span class="ov-lbl">${esc(m)}</span>
        <div class="ov-track"><div class="ov-fill acc" style="width:${Math.round(n/maxT*100)}%"></div></div>
        <span class="ov-val">${n}×</span>
      </div>`).join('')}
    </div>`:''}

    <button class="btn ghost" style="margin-top:4px" onclick="closeModal()">Schließen</button>
  `, true);
}

/* Wischen zwischen Einheiten – ignoriert Züge, die am Drag-Griff starten */
function initBldSwipe(){
  const el=document.getElementById('bldPage'); if(!el) return;
  let x0=null,y0=null,moved=false,skip=false;
  el.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    skip = !!e.target.closest('.bld-grip');   // Drag&Drop nicht stören
    x0=e.touches[0].clientX; y0=e.touches[0].clientY; moved=false;
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(x0==null||skip) return;
    const dx=e.touches[0].clientX-x0, dy=e.touches[0].clientY-y0;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10) moved=true;
  },{passive:true});
  el.addEventListener('touchend',e=>{
    if(x0==null||skip||!moved){ x0=null; skip=false; return; }
    const dx=e.changedTouches[0].clientX-x0;
    x0=null;
    if(document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) return;
    if(dx<-45) goDay(BUILDER.page+1);
    else if(dx>45) goDay(BUILDER.page-1);
  },{passive:true});
}

  syncBuilderName();
  BUILDER.days.push({name:'Tag '+String.fromCharCode(65+BUILDER.days.length),exercises:[]});
  BUILDER.page=BUILDER.days.length-1;  // direkt zur neuen Einheit
  renderBuilder();
}

    syncBuilderName();

    renderBuilder();
  });
}

/* ---- Drag & Drop: Übungen innerhalb einer Einheit umsortieren ---- */
let _dragDi=null, _dragEi=null;
function moveExercise(di, from, to){
  if(from===to || to<0) return;
  const arr=BUILDER.days[di].exercises;
  if(to>=arr.length) to=arr.length-1;
  const [item]=arr.splice(from,1);
  arr.splice(to,0,item);
}
// Desktop (HTML5 drag)
function dragStart(ev,di,ei){ _dragDi=di; _dragEi=ei; ev.dataTransfer.effectAllowed='move';
  try{ev.dataTransfer.setData('text/plain',ei);}catch(e){}
  ev.currentTarget.classList.add('dragging'); }
function dragEnd(ev){ ev.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.bld-row.drop-target').forEach(r=>r.classList.remove('drop-target')); }
function dragOver(ev,di,ei){ if(_dragDi!==di) return; ev.preventDefault(); ev.dataTransfer.dropEffect='move';
  ev.currentTarget.classList.add('drop-target'); }
function dragLeave(ev){ ev.currentTarget.classList.remove('drop-target'); }
function dragDrop(ev,di,ei){ if(_dragDi!==di) return; ev.preventDefault();
  moveExercise(di,_dragEi,ei); _dragDi=null; _dragEi=null; renderBuilder(); }

// Touch (pointer-basiert) — HTML5-Drag ist auf Mobilgeräten unzuverlässig
let _touchDrag=null;
function initTouchDrag(){
  document.querySelectorAll('.bld-grip').forEach(grip=>{
    grip.addEventListener('touchstart', onGripTouchStart, {passive:false});
  });
}
function onGripTouchStart(ev){
  const row=ev.target.closest('.bld-row'); if(!row) return;
  ev.preventDefault();
  const di=+row.dataset.di, ei=+row.dataset.ei;
  const list=row.closest('.bld-exlist');
  row.classList.add('dragging');
  _touchDrag={di, from:ei, row, list};
  const move=e=>{
    const t=e.touches[0];
    const rows=[...list.querySelectorAll('.bld-row')];
    let target=null;
    for(const r of rows){ const rc=r.getBoundingClientRect();
      if(t.clientY>=rc.top && t.clientY<=rc.bottom){ target=r; break; } }
    rows.forEach(r=>r.classList.remove('drop-target'));
    if(target && target!==row) target.classList.add('drop-target');
    _touchDrag.overEi = target? +target.dataset.ei : null;
  };
  const end=()=>{
    document.removeEventListener('touchmove',move);
    document.removeEventListener('touchend',end);
    if(_touchDrag && _touchDrag.overEi!=null && _touchDrag.overEi!==_touchDrag.from){
      moveExercise(_touchDrag.di,_touchDrag.from,_touchDrag.overEi);
      _touchDrag=null; renderBuilder();
    } else { row.classList.remove('dragging');
      list.querySelectorAll('.drop-target').forEach(r=>r.classList.remove('drop-target')); _touchDrag=null; }
  };
  document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('touchend',end);
}
function syncBuilderName(){ const el=document.getElementById('planName'); if(el) BUILDER.name=el.value; }

function exportData(){
  const payload={
    app:'ProgressLab', type:'backup', version:1,
    exportedAt:new Date().toISOString(),
    data:{ plans:DB.plans, logs:DB.logs, settings:DB.settings, customEx:DB.customEx||[] }
  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date(); const p=n=>String(n).padStart(2,'0');
  a.href=url;
  a.download=`ProgressLab-Backup_${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },100);
  toast('Backup heruntergeladen');
}
function importData(ev){
  const file=ev.target.files&&ev.target.files[0];
  ev.target.value=''; // erlaubt erneuten Import derselben Datei
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    let parsed;
    try{ parsed=JSON.parse(reader.result); }
    catch(e){ toast('Datei konnte nicht gelesen werden'); return; }
    const d = parsed && parsed.data ? parsed.data : parsed; // akzeptiert auch rohe {plans,logs}
    if(!d || (!Array.isArray(d.plans) && !Array.isArray(d.logs))){
      toast('Keine gültige ProgressLab-Datei'); return;
    }
    const nP=Array.isArray(d.plans)?d.plans.length:0;
    const nL=Array.isArray(d.logs)?d.logs.length:0;
    const nC=Array.isArray(d.customEx)?d.customEx.length:0;
    confirmModal('Backup wiederherstellen?',
      `Die Datei enthält ${nP} Pläne, ${nL} Trainings${nC?` und ${nC} eigene Übungen`:''}. Deine aktuellen Daten werden dadurch ersetzt.`,
      'Wiederherstellen',()=>{
        DB.plans = Array.isArray(d.plans)? d.plans : [];
        DB.logs  = Array.isArray(d.logs)?  d.logs  : [];
        DB.customEx = Array.isArray(d.customEx)? d.customEx : [];
        if(d.settings && typeof d.settings==='object') DB.settings=Object.assign(DB.settings||{},d.settings);
        DB.logs.sort((a,b)=>a.date-b.date);
        rebuildExDB();
        migrateMuscleNames();   // alte Bezeichnungen aus älteren Backups umstellen
        migrateExerciseIds();   // Übungs-IDs in wiederhergestellten Logs/Plänen nachtragen
        save(); go('stats'); toast('Backup wiederhergestellt ✓');
      });
  };
  reader.readAsText(file);
}

// Fortschritt einer Übung: Volumen pro Training als Kurve + Tabelle aller Werte
function renderExerciseProgress(key){
  const el=document.getElementById('strChart'); if(!el) return;
  // key ist entweder eine stabile exId oder 'name:<Name>' (Altdaten ohne ID).
  const byName = key && key.indexOf('name:')===0;
  const exId = byName ? null : key;
  const name = byName ? key.slice(5) : (exMetaById(key) ? exMetaById(key).n : key);
  const rows=[];
  const f=exFactor(name, exId);
  DB.logs.forEach(l=>{
    // Übung im Log per ID finden (Altdaten per Name).
    const e=l.exercises.find(x=> (exId && x.exId===exId) || x.name===name);
    if(e){
      const done=e.sets.filter(s=>s.done!==false);
      const vol=done.reduce((a,s)=>a+(+s.weight||0)*f*(+s.reps||0),0);
      const topW=done.reduce((m,s)=>Math.max(m,(+s.weight||0)*f),0);
      const setStr=done.map(s=>`${(+s.weight||0)*f}×${+s.reps||0}`).join(', ');
      if(vol>0) rows.push({date:l.date, vol, topW, sets:done.length, setStr});
    }
  });
  if(rows.length<1){ el.innerHTML=`<div class="faint" style="font-size:12.5px;padding:14px 0">Für diese Übung liegen noch keine Trainingsdaten vor.</div>`; return; }

  // Kurve (nur ab 2 Punkten sinnvoll)
  let chart='';
  if(rows.length>=2){
    const vols=rows.map(r=>r.vol);
    const max=Math.max(...vols), min=Math.min(...vols), range=max-min||1;
    const W=100, H=90;
    const path=rows.map((r,i)=>{const x=i/(rows.length-1)*W;const y=H-((r.vol-min)/range)*H;return `${i?'L':'M'}${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ');
    const area=`M0,${H} `+rows.map((r,i)=>{const x=i/(rows.length-1)*W;const y=H-((r.vol-min)/range)*H;return `L${x.toFixed(1)},${y.toFixed(1)}`;}).join(' ')+` L${W},${H} Z`;
    const first=rows[0].vol, last=rows[rows.length-1].vol, diff=last-first;
    const pct=first? Math.round(diff/first*100):0;
    chart=`<div class="row between" style="margin:8px 0 10px">
        <span class="faint" style="font-size:12px">${rows.length} Trainings</span>
        <span class="pill ${diff>0?'up':diff<0?'down':'same'}">${diff>0?'+':''}${(diff/1000).toFixed(1)}t · ${pct>0?'+':''}${pct}%</span></div>
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:120px;overflow:visible">
        <defs><linearGradient id="volgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
        <path d="${area}" fill="url(#volgrad)" stroke="none"/>
        <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
        ${rows.map((r,i)=>{const x=i/(rows.length-1)*W;const y=H-((r.vol-min)/range)*H;return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="var(--accent)" vector-effect="non-scaling-stroke"/>`;}).join('')}
      </svg>`;
  }

  // Tabelle aller Werte (neueste zuerst)
  const table=`<div class="prog-table">
    <div class="prog-row prog-head"><span>Datum</span><span>Sätze</span><span>Top-kg</span><span>Volumen</span></div>
    ${[...rows].reverse().map(r=>`<div class="prog-row" title="${esc(r.setStr)}">
      <span>${fmtDate(r.date)}</span>
      <span class="num">${r.sets}</span>
      <span class="num">${r.topW} kg</span>
      <span class="num" style="font-weight:700;color:var(--accent-dim)">${r.vol.toLocaleString('de-DE')} kg</span>
    </div>`).join('')}
  </div>`;

  el.innerHTML=chart+table;
}

/* ================================================================
   EIGENE ÜBUNGEN: erstellen / bearbeiten / löschen
   ================================================================ */
let CUSTOM=null; // Arbeitsobjekt im Formular
const CUSTOM_EQUIP=['Langhantel','Kurzhantel','Maschine','Kabelzug','Körpergewicht','Kettlebell','SZ-Stange','Ohne Gerät','Sonstiges'];
// Feste Auswahl spezifischer Muskeln für Sekundär-Angabe (eigene Übungen)
const SECONDARY_MUSCLES=[
  'Obere Brust','Untere Brust','Latissimus','Oberer Rücken','Unterer Rücken','Trapez',
  'Vordere Schulter','Seitliche Schulter','Hintere Schulter','Bizeps','Trizeps','Unterarme',
  'Bauch','Seitlicher Bauch','Gesäß','Quadrizeps','Adduktoren','Waden','Nacken'
];
// Alte Bezeichnungen in gespeicherten Übungen auf die neuen umstellen
const MUSCLE_RENAMES={'Brust (oberer)':'Obere Brust','Brust (unterer)':'Untere Brust'};
function migrateMuscleNames(){
  let changed=false;
  (DB.customEx||[]).forEach(e=>{
    if(!Array.isArray(e.sm)) return;
    e.sm=e.sm.map(m=>{ if(MUSCLE_RENAMES[m]){changed=true; return MUSCLE_RENAMES[m];} return m; });
  });
  // Primärgruppen in Plänen und Logs auf Körperregionen umstellen
  (DB.plans||[]).forEach(p=>(p.days||[]).forEach(d=>(d.exercises||[]).forEach(e=>{
    const r=toRegion(e.muscle); if(r!==e.muscle){ e.muscle=r; changed=true; }
  })));
  (DB.logs||[]).forEach(l=>(l.exercises||[]).forEach(e=>{
    const r=toRegion(e.muscle); if(r!==e.muscle){ e.muscle=r; changed=true; }
  }));
  (DB.customEx||[]).forEach(e=>{
    const r=toRegion(e.g);
    if(r!==e.g){ e.g=r; e.pm=[r]; changed=true; }
  });
  if(DB.settings && Array.isArray(DB.settings.customMuscles)){
    const before=DB.settings.customMuscles.length;
    DB.settings.customMuscles=DB.settings.customMuscles
      .map(m=>MUSCLE_RENAMES[m]||m)
      .filter(m=>!SECONDARY_MUSCLES.includes(m));   // Duplikate zur festen Liste raus
    if(DB.settings.customMuscles.length!==before) changed=true;
  }
  if(changed){ rebuildExDB(); save(); }
}
// Einmalige Migration: trägt allen Übungen in bestehenden Logs und Plänen ihre
// stabile exId nach (per Namensauflösung). Danach überlebt die Verknüpfung ein
// Umbenennen der Übung. Läuft bei jedem Laden, ist aber idempotent (macht nichts,
// wenn schon alle IDs gesetzt sind) und verändert Altdaten nicht destruktiv:
// der Name bleibt als Anzeige-Text erhalten.
function migrateExerciseIds(){
  let changed=false, linked=0, unmatched=0;
  const fix=(exArr)=>{
    (exArr||[]).forEach(e=>{
      if(e.exId) return;                 // schon verknüpft
      const id=exIdForName(e.name);      // passende Übung per Namen suchen
      if(id){ e.exId=id; linked++; changed=true; }
      else { unmatched++; }              // keine Übung dieses Namens (mehr) vorhanden
    });
  };
  (DB.logs||[]).forEach(l=>fix(l.exercises));
  (DB.plans||[]).forEach(p=>(p.days||[]).forEach(d=>fix(d.exercises)));
  if(changed){ save(); }
  // Für Debug/Transparenz im Log (stört den Nutzer nicht)
  if(linked||unmatched) console.log(`[Migration] Übungs-IDs verknüpft: ${linked}, ohne Treffer: ${unmatched}`);
}
const MAX_IMG_BYTES=1_500_000; // ~1,5 MB Warnschwelle für hochgeladene Bilder

function openCustomExercise(id){
  if(!CUSTOM_RETURN) CUSTOM_RETURN=captureReturn();   // wohin nach dem Speichern zurück?
  const src = id ? (customList().find(e=>e.id===id)) : null;
  CUSTOM = src ? JSON.parse(JSON.stringify(src)) : {
    id:uid(), custom:true, n:'', g:MUSCLES[0], eq:CUSTOM_EQUIP[0], bench:'', dumbbells:2,
    pm:[], sm:[], cat:'', lvl:'', frc:'', ins:[], img:[], imgMode:'file'
  };
  if(CUSTOM.dumbbells!==1 && CUSTOM.dumbbells!==2) CUSTOM.dumbbells = 2;
  if(!Array.isArray(CUSTOM.sm)) CUSTOM.sm=[];
  // Alle bekannten Muskeln (eingebaute + selbst hinzugefügte) sind Kacheln.
  // Sollte eine Übung noch einen Muskel enthalten, der (noch) keine Kachel ist, wird er ergänzt.
  CUSTOM.sm.forEach(m=>{ if(!allMuscles().includes(m)) addCustomMuscle(m, true); });
  CUSTOM._smChips = CUSTOM.sm.slice();
  if(!CUSTOM.imgMode) CUSTOM.imgMode = (CUSTOM.img[0]&&/^https?:/i.test(CUSTOM.img[0]))?'url':'file';
  CUSTOM._isEdit = !!id;
  renderCustomForm(!!id);
}
/* ---- Muskel-Kacheln: eingebaute + eigene (dauerhaft gemerkt) ---- */
function customMuscles(){
  if(!DB.settings) DB.settings={};
  if(!Array.isArray(DB.settings.customMuscles)) DB.settings.customMuscles=[];
  return DB.settings.customMuscles;
}
function allMuscles(){ return SECONDARY_MUSCLES.concat(customMuscles()); }
function addCustomMuscle(name, silent){
  name=(name||'').trim();
  if(!name) return false;
  const all=allMuscles();
  if(all.some(m=>m.toLowerCase()===name.toLowerCase())){
    if(!silent) toast('Dieser Muskel ist bereits vorhanden');
    return false;
  }
  customMuscles().push(name);
  if(!silent) save();
  return true;
}
function addMuscleFromInput(){
  const el=document.getElementById('cxNewMuscle');
  const name=el?el.value.trim():'';
  if(!name) return;
  if(addCustomMuscle(name)){
    // neu angelegte Muskeln gleich für diese Übung auswählen
    (CUSTOM._smChips||(CUSTOM._smChips=[])).push(name);
    renderCustomForm(!!CUSTOM._isEdit);
  }
}
function deleteCustomMuscle(name){
  confirmModal('Muskel entfernen?', `„${name}“ wird aus der Auswahl entfernt. Bereits gespeicherte Übungen behalten den Eintrag.`, 'Entfernen', ()=>{
    DB.settings.customMuscles = customMuscles().filter(m=>m!==name);
    // aus der aktuellen Auswahl nehmen
    if(CUSTOM && Array.isArray(CUSTOM._smChips)) CUSTOM._smChips=CUSTOM._smChips.filter(m=>m!==name);
    save();
    renderCustomForm(!!(CUSTOM&&CUSTOM._isEdit));
  });
}
function toggleSecMuscle(m){
  const arr=CUSTOM._smChips||(CUSTOM._smChips=[]);
  const i=arr.indexOf(m);
  if(i>=0) arr.splice(i,1); else arr.push(m);
  renderCustomForm(!!CUSTOM._isEdit);
}
function renderCustomForm(isEdit){
  const c=CUSTOM;
  const insText=(c.ins||[]).join('\n');
  const img=c.img[0]||'';
  openModal(`<div class="grab"></div>
    <h2>${isEdit?'Übung bearbeiten':'Eigene Übung'}</h2>
    <div class="field" style="margin-top:16px"><label>Name der Übung</label>
      <input class="input" id="cxName" placeholder="z. B. Enges Bankdrücken" value="${esc(c.n)}" oninput="CUSTOM.n=this.value"></div>
    <div class="field"><label>Körperregion <span class="faint" style="font-weight:400">(primär)</span></label>
      <select class="input" id="cxMuscle" onchange="CUSTOM.g=this.value">
        ${MUSCLES.map(m=>`<option ${c.g===m?'selected':''}>${m}</option>`).join('')}
      </select></div>
    <div class="field"><label>Beanspruchte Muskeln <span class="faint" style="font-weight:400">(mehrere möglich)</span></label>
      <div class="sec-chips">
        ${allMuscles().map(m=>{
          const on=(c._smChips||[]).includes(m);
          const own=customMuscles().includes(m);
          return `<span class="chip ${on?'on':''} ${own?'own':''}" onclick="toggleSecMuscle('${escAttr(m)}')">${esc(m)}${own?`<button class="chip-x" onclick="event.stopPropagation();deleteCustomMuscle('${escAttr(m)}')" title="Muskel entfernen">${I.x}</button>`:''}</span>`;
        }).join('')}
      </div>
      <div class="row" style="gap:7px;margin-top:10px">
        <input class="input" id="cxNewMuscle" style="flex:1;min-width:0" placeholder="Eigenen Muskel hinzufügen…"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addMuscleFromInput();}">
        <button class="btn-slim" style="width:auto;padding:10px 14px;flex-shrink:0" onclick="addMuscleFromInput()">${I.plus}<span>Neu</span></button>
      </div></div>
    <div class="field"><label>Gerät</label>
      <select class="input" id="cxEquip" onchange="CUSTOM.eq=this.value;renderCustomForm(${isEdit})">
        ${CUSTOM_EQUIP.map(q=>`<option ${c.eq===q?'selected':''}>${q}</option>`).join('')}
      </select></div>
    ${c.eq==='Kurzhantel'?`<div class="field"><label>Anzahl Hanteln</label>
      <div class="cx-imgmode">
        <button class="cx-seg ${c.dumbbells===1?'on':''}" onclick="CUSTOM.dumbbells=1;renderCustomForm(${isEdit})">1 Hantel</button>
        <button class="cx-seg ${c.dumbbells===2?'on':''}" onclick="CUSTOM.dumbbells=2;renderCustomForm(${isEdit})">2 Hanteln</button>
      </div>
      <p class="faint" style="font-size:11px;margin-top:8px">Du gibst im Training das Gewicht <b>einer</b> Hantel an. Bei 2 Hanteln wird für Volumen und Statistik automatisch das Doppelte gerechnet.</p></div>`:''}
    <div class="field"><label>Hantelbank <span class="faint" style="font-weight:400">(optional)</span></label>
      <input class="input" id="cxBench" placeholder="z. B. 30° positiv oder keine" value="${esc(c.bench||'')}" oninput="CUSTOM.bench=this.value"></div>

    <div class="field"><label>Bild / GIF</label>
      <div class="cx-imgmode">
        <button class="cx-seg ${c.imgMode==='file'?'on':''}" onclick="CUSTOM.imgMode='file';renderCustomForm(${isEdit})">Datei hochladen</button>
        <button class="cx-seg ${c.imgMode==='url'?'on':''}" onclick="CUSTOM.imgMode='url';renderCustomForm(${isEdit})">Web-Link</button>
      </div>
      ${c.imgMode==='file'
        ? `<input type="file" id="cxFile" accept="image/*,image/gif" style="display:none" onchange="onCustomImgFile(event)">
           <button class="btn-slim" style="margin-top:10px" onclick="document.getElementById('cxFile').click()">${I.upload}<span>${img?'Bild ersetzen':'Bild/GIF wählen'}</span></button>
           <p class="faint" style="font-size:11px;margin-top:8px">Empfohlen unter 1,5 MB (lokaler Speicher ist begrenzt).</p>`
        : `<input class="input" id="cxUrl" placeholder="https://…/uebung.gif" value="${img&&/^https?:/i.test(img)?esc(img):''}" oninput="setCustomImgUrl(this.value)">
           <p class="faint" style="font-size:11px;margin-top:8px">Adresse eines GIFs oder Bildes (z. B. von Giphy/Tenor). Zum Anzeigen ist Internet nötig.</p>`}
      <div id="cxPreview">${customPreview(img)}</div>
    </div>

    <div class="field"><label>Ausführung (eine Zeile pro Schritt)</label>
      <textarea class="input" id="cxIns" rows="5" style="resize:vertical;line-height:1.5" placeholder="Schritt 1…&#10;Schritt 2…&#10;Schritt 3…" oninput="CUSTOM._insText=this.value">${esc(insText)}</textarea></div>

    <button class="btn-slim solid" style="margin-top:6px" onclick="saveCustomExercise(${isEdit})"><span>${isEdit?'Änderungen speichern':'Übung speichern'}</span></button>
    <button class="btn ghost" style="margin-top:10px" onclick="cancelCustomExercise()">Abbrechen</button>
  `);
  // Klick daneben soll die Eingaben nicht verlieren
  guardModal(CUSTOM.n||'Eigene Übung', ()=>renderCustomForm(isEdit));
}
// Abbrechen: fragt nach und kehrt dorthin zurück, wo man herkam
function cancelCustomExercise(){
  MODAL_GUARD=null;
  const back=CUSTOM_RETURN; CUSTOM_RETURN=null;
  closeOverlay();
  if(back) back();
  else if(BUILDER_OPEN) renderBuilder();
  else if(_pickCb) renderPicker();
  else closeModal();
}
function customPreview(img){
  if(!img) return '';
  return `<div class="cx-preview"><img src="${img}" alt="Vorschau" onerror="this.parentNode.classList.add('bad')"><span class="cx-preview-bad">Bild konnte nicht geladen werden</span></div>`;
}
function refreshCustomPreview(){
  const el=document.getElementById('cxPreview'); if(el) el.innerHTML=customPreview(CUSTOM.img[0]||'');
}
function setCustomImgUrl(v){
  v=(v||'').trim();
  CUSTOM.img = v? [v] : [];
  refreshCustomPreview();
}
function onCustomImgFile(ev){
  const file=ev.target.files&&ev.target.files[0];
  ev.target.value='';
  if(!file) return;
  if(!/^image\//.test(file.type)){ toast('Bitte eine Bilddatei wählen'); return; }
  const reader=new FileReader();
  reader.onload=()=>{
    const dataUrl=reader.result;
    // grobe Größe der Base64-Daten
    const bytes=Math.round((dataUrl.length-(dataUrl.indexOf(',')+1))*0.75);
    const proceed=()=>{ CUSTOM.img=[dataUrl]; refreshCustomPreview(); toast('Bild übernommen'); };
    if(bytes>MAX_IMG_BYTES){
      confirmModal('Großes Bild',
        `Die Datei ist ca. ${(bytes/1_000_000).toFixed(1)} MB groß. Der lokale Speicher ist begrenzt (meist ~5 MB gesamt) – große Bilder können dazu führen, dass das Speichern fehlschlägt. Trotzdem verwenden?`,
        'Trotzdem verwenden', proceed);
    } else proceed();
  };
  reader.onerror=()=>toast('Datei konnte nicht gelesen werden');
  reader.readAsDataURL(file);
}
function saveCustomExercise(isEdit){
  const c=CUSTOM;
  c.n=(c.n||'').trim();
  if(!c.n){ toast('Bitte einen Namen eingeben'); return; }
  // Namens-Kollision vermeiden (mit anderer Übung gleichen Namens)
  const clash = allRaw().some(e=>e.n.toLowerCase()===c.n.toLowerCase() && e.id!==c.id);
  if(clash){ toast('Name bereits vergeben – bitte anders benennen'); return; }
  // Anleitung aus Textarea in Schritte
  const txt = (c._insText!=null? c._insText : (c.ins||[]).join('\n'));
  c.ins = txt.split('\n').map(s=>s.trim()).filter(Boolean);
  delete c._insText;
  // primärer Muskel = Gruppe (wie gewünscht: eine Hauptmuskelgruppe)
  c.pm = [c.g];
  c.bench = (c.bench||'').trim();
  // Anzahl Hanteln: nur bei Kurzhantel relevant; sonst immer 1 (kein Faktor)
  c.dumbbells = (c.eq==='Kurzhantel' && c.dumbbells===2) ? 2 : 1;
  // Sekundärmuskeln = ausgewählte Chips + freie Eingaben (dedupliziert, ohne die Hauptgruppe)
  const chips = c._smChips||[];
  const merged=[];
  chips.forEach(m=>{ if(m && m!==c.g && !merged.some(x=>x.toLowerCase()===m.toLowerCase())) merged.push(m); });
  c.sm = merged;
  delete c._smChips; delete c._smExtra; delete c._isEdit;
  const arr = DB.customEx || (DB.customEx=[]);
  const idx = arr.findIndex(e=>e.id===c.id);
  // Versuch zu speichern; localStorage-Limit abfangen
  const backup = JSON.stringify(arr);
  if(idx>=0) arr[idx]=c; else arr.push(c);
  try{
    localStorage.setItem(KEY, JSON.stringify(DB)); // sofort testen (nicht das debounced save)
  }catch(err){
    // zurückrollen
    DB.customEx = JSON.parse(backup);
    toast('Speicher voll – Bild ist zu groß. Bitte Web-Link nutzen oder kleineres Bild.');
    return;
  }
  rebuildExDB();
  // Namen in Plänen an den (evtl. geänderten) Übungsnamen angleichen – per exId,
  // damit umbenannte Übungen in Plänen sofort korrekt heißen. Logs bleiben bewusst
  // unverändert (historische Genauigkeit: so hieß die Übung zum Trainingszeitpunkt).
  (DB.plans||[]).forEach(p=>(p.days||[]).forEach(d=>(d.exercises||[]).forEach(e=>{
    if(e.exId===c.id){ e.name=c.n; e.muscle=toRegion(c.g); }
  })));
  save();
  MODAL_GUARD=null;      // Formular ist gespeichert, kein Schutz mehr nötig
  closeOverlay();
  returnFromCustom();    // zurück dorthin, wo man herkam (Editor, Picker oder Ansicht)
  toast(isEdit?'Übung aktualisiert':'Übung erstellt ✓');
}
/* Merkt sich, woher das Übungs-Formular geöffnet wurde, und kehrt dorthin zurück. */
let CUSTOM_RETURN=null;   // Funktion, die die vorherige Ansicht wiederherstellt
// Ermittelt das passende Rücksprungziel: Plan-Editor > Picker > normale Ansicht
function captureReturn(){
  if(BUILDER_OPEN) return ()=>renderBuilder();
  if(_pickCb)      return ()=>renderPicker();
  return ()=>renderView();
}
function returnFromCustom(){
  const back=CUSTOM_RETURN;
  CUSTOM_RETURN=null;
  if(back){ back(); return; }
  if(BUILDER_OPEN){ renderBuilder(); return; }
  if(_pickCb){ renderPicker(); return; }
  renderView();
}
function deleteCustomExercise(id){
  confirmModal('Übung löschen?','Die eigene Übung wird entfernt. Bereits gespeicherte Trainings bleiben erhalten.','Löschen',()=>{
    DB.customEx=(DB.customEx||[]).filter(e=>e.id!==id);
    rebuildExDB(); save();
    MODAL_GUARD=null; closeOverlay();
    returnFromCustom();
    toast('Übung gelöscht');
  });
}

/* ================================================================
   MODAL / CONFIRM
   ================================================================ */
function openModal(html, tall, extraClass){ const bg=document.getElementById('modalBg'); const box=document.getElementById('modalBox'); box.className='modal'+(tall?' tall':'')+(extraClass?' '+extraClass:''); box.innerHTML=html; bg.classList.add('show'); }
// Hart schließen: Overlay weg + alle Zustände (Editor, Rücksprung, Guard) zurücksetzen
function closeModal(){ MODAL_GUARD=null; BUILDER_OPEN=false; CUSTOM_RETURN=null; _pickCb=null; closeOverlay(); }
// Weich schließen: nur ausblenden – für Zwischenschritte, bei denen die Kette erhalten bleibt
function closeOverlay(){ document.getElementById('modalBg').classList.remove('show'); }
/* Schutz vor Datenverlust: Solange ein Formular ungespeicherte Änderungen hat,
   fragt ein Klick daneben nach, statt einfach zu schließen.
   restore() zeichnet das Formular wieder, falls der Nutzer doch nicht verwerfen will. */
let MODAL_GUARD=null;   // {label, restore}
function guardModal(label, restore){ MODAL_GUARD={label, restore}; }
function tryCloseModal(){
  if(MODAL_GUARD){
    const g=MODAL_GUARD;
    MODAL_GUARD=null;                       // damit confirmModal nicht selbst geschützt ist
    confirmModal('Änderungen verwerfen?',
      `Deine Eingaben ${g.label?'bei „'+g.label+'“ ':''}gehen verloren.`,
      'Verwerfen',
      ()=>{ closeModal(); },                // wirklich verwerfen
      ()=>{ if(g.restore) g.restore(); else closeModal(); }  // doch nicht: Formular zurückholen
    );
    return;
  }
  // Kein Formular offen: aus Unteransichten (Picker/Detail) zurück in den Plan-Editor
  if(BUILDER_OPEN && !document.querySelector('.bld')){ closeOverlay(); renderBuilder(); return; }
  closeModal();
}
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') tryCloseModal(); });
function confirmModal(title,msg,confirmLabel,onOk,onCancel){
  openModal(`<div class="grab"></div><h2>${esc(title)}</h2>
    ${msg?`<p class="muted" style="margin:6px 0 20px">${esc(msg)}</p>`:'<div style="height:16px"></div>'}
    <button class="btn danger" style="margin-bottom:10px" id="_cok">${esc(confirmLabel)}</button>
    <button class="btn ghost" id="_cno">Zurück</button>`);
  document.getElementById('_cok').onclick=()=>{ closeOverlay(); onOk(); };
  document.getElementById('_cno').onclick=()=>{ if(onCancel) onCancel(); else closeModal(); };
}

/* ================================================================
   INIT
   ================================================================ */
rebuildExDB();
migrateMuscleNames();   // alte Muskel-Bezeichnungen umstellen
migrateExerciseIds();   // Übungs-IDs in bestehenden Logs/Plänen nachtragen
renderNav();
renderView();
initCloud();            // Cloud-Sitzung wiederherstellen und abgleichen
</script>
